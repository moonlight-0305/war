<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전투기 에이스: 울트라 멀티플레이어</title>
    <!-- PeerJS: WebRTC를 이용한 서버리스 멀티플레이 구현 라이브러리 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #00aaff;
            --accent: #ffaa00;
            --danger: #ff4400;
            --bg-dark: #00050a;
            --panel-bg: rgba(0, 20, 40, 0.95);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            user-select: none;
        }

        canvas { display: block; }

        /* --- UI 레이아웃 컨테이너 --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 캔버스 클릭 방해 금지 */
            z-index: 100;
        }

        .interactive {
            pointer-events: auto !important; /* UI 요소만 클릭 가능하게 설정 */
        }

        .glass-panel {
            background: var(--panel-bg);
            padding: 24px;
            border: 2px solid var(--primary);
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        /* --- 접속 및 로비 섹션 --- */
        #lobby-view {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status-card {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .id-display {
            font-size: 2.5em;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
            display: block;
            margin: 10px 0;
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #001a33;
            border: 1px solid var(--primary);
            border-radius: 8px;
            color: #fff;
            font-size: 1.1em;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: #fff; }

        /* --- 채팅 시스템 --- */
        #chat-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #chat-box {
            height: 180px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-size: 0.9em;
            border: 1px solid #222;
        }

        .chat-line { margin-bottom: 6px; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
        .chat-name { font-weight: bold; color: var(--primary); margin-right: 6px; }
        .chat-sys { color: #888; font-style: italic; }

        /* --- 인게임 업그레이드 메뉴 --- */
        #game-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            display: none;
        }

        #upgrade-menu {
            margin-top: 15px;
            width: 320px;
            display: none;
        }

        .menu-btn {
            width: 100%;
            padding: 14px;
            margin: 6px 0;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-btn:hover:not(:disabled) {
            background: #00d4ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 170, 255, 0.4);
        }

        .menu-btn:active:not(:disabled) { transform: translateY(0); }
        .menu-btn:disabled {
            background: #334455;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .nuke-btn { background: var(--danger); }
        .nuke-btn:hover:not(:disabled) { background: #ff6600; box-shadow: 0 5px 15px rgba(255, 68, 0, 0.4); }

        .price-tag {
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        /* --- 유닛 상태 바 --- */
        .player-stat-row { margin-bottom: 15px; }
        .bar-container {
            width: 100%;
            height: 12px;
            background: #111;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 5px;
            border: 1px solid #333;
        }
        .bar-fill { height: 100%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* --- 게임 종료 화면 --- */
        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <!-- 1. 대기실/로비 뷰 -->
    <div id="lobby-view" class="glass-panel interactive">
        <div class="status-card">
            <h2 style="margin:0; letter-spacing:4px;">AIR COMBAT ACE</h2>
            <p style="font-size:0.8em; color:#888;">멀티플레이어 협동 작전</p>
            <div class="id-display" id="my-id-text">연결 중...</div>
            <p style="margin:0; font-size:0.7em; color:var(--primary);">이 번호를 파트너에게 알려주세요</p>
        </div>

        <div style="display:flex; gap:10px;">
            <input type="text" id="join-id-input" placeholder="코드 4자리 입력" maxlength="4">
            <button class="menu-btn interactive" style="width:120px; margin:0;" onclick="joinGame()">참가</button>
        </div>

        <div id="chat-area">
            <div id="chat-box">
                <div class="chat-line chat-sys">서버에 접속하는 중입니다...</div>
            </div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-input" placeholder="메시지 입력..." class="interactive" style="text-align:left; flex:1; font-size:0.9em;">
                <button class="menu-btn interactive" style="width:70px; margin:0; padding:0;" onclick="handleChatSend()">전송</button>
            </div>
        </div>
        
        <p style="text-align:center; font-size:0.75em; color:#666; margin:0;">호스트가 게임에 참가하면 즉시 시작됩니다.</p>
    </div>

    <!-- 2. 인게임 HUD -->
    <div id="game-hud">
        <button class="menu-btn interactive" id="toggle-menu-btn" onclick="ui.toggleMenu()" style="width:200px;">
            <span>업그레이드 (TAB)</span>
        </button>

        <div id="upgrade-menu" class="glass-panel interactive">
            <div id="team-status">
                <!-- 플레이어들의 HP 바가 여기에 생성됨 -->
            </div>

            <div style="margin: 15px 0; border-top: 1px solid #333; padding-top: 10px;">
                <span style="font-size:0.9em; color:#aaa;">보유 포인트</span>
                <div id="hud-points" style="font-size:1.8em; font-weight:bold; color:var(--accent);">0</div>
            </div>

            <button class="menu-btn interactive" id="btn-up-fire" onclick="game.requestUpgrade('fireRate')">
                <span>연사력 강화</span> <span class="price-tag">50 P</span>
            </button>
            <button class="menu-btn interactive" id="btn-up-hp" onclick="game.requestUpgrade('maxHp')">
                <span>내구도 수리</span> <span class="price-tag">50 P</span>
            </button>
            <button class="menu-btn interactive nuke-btn" id="btn-up-nuke" onclick="game.requestUpgrade('nuke')">
                <span>☢ 핵미사일 구매</span> <span class="price-tag">200 P</span>
            </button>
            <div id="nuke-count" style="text-align:center; font-size:0.8em; margin-top:10px; color:var(--accent);">보유 핵미사일: 0 (Q키)</div>
        </div>
    </div>
</div>

<!-- 게임 종료 화면 -->
<div id="game-over" class="interactive">
    <h1 style="color:var(--danger); font-size:4em; margin-bottom:10px;">MISSION FAILED</h1>
    <p style="font-size:1.5em; margin-bottom:30px;">기체가 파괴되었습니다.</p>
    <button class="menu-btn interactive" style="width:200px;" onclick="location.reload()">다시 도전</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * 전역 설정 및 상수
 */
const CONFIG = {
    COSTS: { fireRate: 50, maxHp: 50, nuke: 200 },
    START_HP: 10,
    ENEMY_HP: 2,
    BULLET_SPEED: 15,
    PLAYER_SPEED: 7
};

/**
 * 게임 엔진 핵심 클래스
 */
class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.width = this.canvas.width = window.innerWidth;
        this.height = this.canvas.height = window.innerHeight;
        
        this.isHost = true;
        this.isRunning = false;
        this.isGameOver = false;
        this.myId = null;
        
        this.state = {
            players: {},
            enemies: [],
            bullets: [],
            difficulty: 1.0,
            startTime: Date.now()
        };

        this.keys = {};
        this.nukeVisual = 0;
        
        this.initEvents();
    }

    initEvents() {
        window.addEventListener('keydown', e => {
            if(document.activeElement.tagName === 'INPUT') return;
            this.keys[e.code] = true;
            if(e.code === 'Tab') { e.preventDefault(); ui.toggleMenu(); }
            if(e.code === 'KeyQ') this.requestUpgrade('useNuke');
        });
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        window.addEventListener('resize', () => {
            this.width = this.canvas.width = window.innerWidth;
            this.height = this.canvas.height = window.innerHeight;
        });
    }

    // 업그레이드 요청 처리 (호스트면 즉시 실행, 클라이언트면 데이터 전송)
    requestUpgrade(type) {
        if (this.isGameOver) return;
        
        if (this.isHost) {
            this.applyUpgrade(this.myId, type);
        } else if (net.conn && net.conn.open) {
            net.conn.send({ type: 'UPGRADE_REQ', stat: type, from: this.myId });
        }
    }

    applyUpgrade(playerId, type) {
        const p = this.state.players[playerId];
        if (!p) return;

        switch(type) {
            case 'fireRate':
                if (p.points >= CONFIG.COSTS.fireRate) {
                    p.fireRate = Math.max(100, p.fireRate - 70);
                    p.points -= CONFIG.COSTS.fireRate;
                }
                break;
            case 'maxHp':
                if (p.points >= CONFIG.COSTS.maxHp) {
                    p.hp = Math.min(p.maxHp, p.hp + 5);
                    p.points -= CONFIG.COSTS.maxHp;
                }
                break;
            case 'nuke':
                if (p.points >= CONFIG.COSTS.nuke) {
                    p.nukes++;
                    p.points -= CONFIG.COSTS.nuke;
                }
                break;
            case 'useNuke':
                if (p.nukes > 0 && this.nukeVisual <= 0) {
                    p.nukes--;
                    this.triggerNuke();
                }
                break;
        }
        ui.updateHUD();
    }

    triggerNuke() {
        this.nukeVisual = 1.0;
        // 호스트에서 모든 적 제거
        if (this.isHost) {
            this.state.enemies.forEach(en => {
                if (en.x < this.width) {
                    en.x = this.width + 1000; // 화면 밖으로 멀리 보냄
                }
            });
            net.broadcastNuke();
        }
    }

    spawnPlayer(id, isLocalHost) {
        this.state.players[id] = {
            id: id,
            x: 100,
            y: this.height / 2 + (isLocalHost ? -50 : 50),
            hp: CONFIG.START_HP,
            maxHp: CONFIG.START_HP,
            points: 0,
            score: 0,
            fireRate: 600,
            lastFire: 0,
            nukes: 0,
            color: isLocalHost ? '#00aaff' : '#00ffaa',
            inputs: {}
        };
        if(this.isHost) this.spawnEnemies(5);
    }

    spawnEnemies(count) {
        for(let i=0; i<count; i++) {
            this.state.enemies.push({
                x: this.width + Math.random() * 1000,
                y: Math.random() * this.height,
                hp: CONFIG.ENEMY_HP,
                lastFire: 0
            });
        }
    }

    update() {
        if (!this.isRunning || this.isGameOver) return;

        if (this.isHost) {
            this.updateHost();
        } else {
            this.updateClient();
        }
    }

    updateHost() {
        const now = Date.now();
        this.state.difficulty = 1 + (now - this.state.startTime) / 60000;
        
        let anyoneAlive = false;

        // 플레이어 로직
        for (let id in this.state.players) {
            const p = this.state.players[id];
            if (p.hp <= 0) continue;
            anyoneAlive = true;

            const input = (id === this.myId) ? this.keys : p.inputs;
            if (input) {
                if (input['ArrowUp'] || input['KeyW']) p.y -= CONFIG.PLAYER_SPEED;
                if (input['ArrowDown'] || input['KeyS']) p.y += CONFIG.PLAYER_SPEED;
                if (input['ArrowLeft'] || input['KeyA']) p.x -= CONFIG.PLAYER_SPEED;
                if (input['ArrowRight'] || input['KeyD']) p.x += CONFIG.PLAYER_SPEED;
            }
            p.x = Math.max(30, Math.min(this.width - 30, p.x));
            p.y = Math.max(30, Math.min(this.height - 30, p.y));

            // 자동 사격
            if (now - p.lastFire > p.fireRate) {
                let target = null;
                let minDist = 800;
                this.state.enemies.forEach(en => {
                    let d = Math.hypot(en.x - p.x, en.y - p.y);
                    if (d < minDist) { minDist = d; target = en; }
                });
                
                if (target) {
                    const angle = Math.atan2(target.y - p.y, target.x - p.x);
                    this.state.bullets.push({
                        x: p.x + 20, y: p.y, vx: Math.cos(angle) * CONFIG.BULLET_SPEED, vy: Math.sin(angle) * CONFIG.BULLET_SPEED,
                        side: 'p', ownerId: id, color: p.color
                    });
                    p.lastFire = now;
                }
            }
        }

        if (!anyoneAlive) {
            this.isGameOver = true;
            this.state.isGameOver = true;
            ui.showGameOver();
        }

        // 적 로직
        this.state.enemies.forEach(en => {
            en.x -= (4 * this.state.difficulty);
            en.y += Math.sin(now / 1000 + en.x / 100) * 2;

            if (en.x < -100) {
                en.x = this.width + 200;
                en.y = Math.random() * this.height;
                en.hp = CONFIG.ENEMY_HP * this.state.difficulty;
            }

            if (now - en.lastFire > 2500) {
                this.state.bullets.push({ x: en.x - 20, y: en.y, vx: -8, vy: 0, side: 'e', color: '#ff4444' });
                en.lastFire = now;
            }
        });

        // 총알 로직
        this.state.bullets = this.state.bullets.filter(b => {
            b.x += b.vx; b.y += b.vy;
            if (b.side === 'p') {
                for (let en of this.state.enemies) {
                    if (Math.hypot(b.x - en.x, b.y - en.y) < 30) {
                        en.hp -= 1;
                        if (en.hp <= 0) {
                            en.x = this.width + 400; 
                            en.hp = CONFIG.ENEMY_HP * this.state.difficulty;
                            this.state.players[b.ownerId].points += 100;
                            this.state.players[b.ownerId].score += 100;
                        }
                        return false;
                    }
                }
            } else {
                for (let id in this.state.players) {
                    const p = this.state.players[id];
                    if (p.hp > 0 && Math.hypot(b.x - p.x, b.y - p.y) < 25) {
                        p.hp -= 1;
                        return false;
                    }
                }
            }
            return b.x > -50 && b.x < this.width + 50 && b.y > -50 && b.y < this.height + 50;
        });

        net.broadcastState();
        ui.updateHUD();
    }

    updateClient() {
        // 클라이언트는 본인의 입력만 전송
        net.sendInput();
        ui.updateHUD();
    }

    render() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.width, this.height);

        // 배경 그리드 (전투 느낌)
        ctx.strokeStyle = 'rgba(0, 170, 255, 0.1)';
        ctx.lineWidth = 1;
        for(let x=0; x<this.width; x+=100) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, this.height); ctx.stroke(); }
        for(let y=0; y<this.height; y+=100) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(this.width, y); ctx.stroke(); }

        // 플레이어 렌더링
        for (let id in this.state.players) {
            const p = this.state.players[id];
            if (p.hp <= 0) continue;
            this.drawFighter(p.x, p.y, p.color, false);
            // 닉네임 표시
            ctx.fillStyle = "#fff";
            ctx.font = "12px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(id === this.myId ? "YOU" : `ALLY (${id})`, p.x, p.y - 30);
        }

        // 적군 렌더링
        this.state.enemies.forEach(en => {
            this.drawFighter(en.x, en.y, '#ff4444', true);
        });

        // 탄환 렌더링
        this.state.bullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = b.color;
            ctx.beginPath();
            ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        // 핵 폭발 효과
        if (this.nukeVisual > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.nukeVisual})`;
            ctx.fillRect(0,0,this.width,this.height);
            this.nukeVisual -= 0.02;
        }
    }

    drawFighter(x, y, color, isEnemy) {
        const ctx = this.ctx;
        ctx.save();
        ctx.translate(x, y);
        if (isEnemy) ctx.rotate(Math.PI);

        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
        ctx.fillStyle = color;

        ctx.beginPath();
        ctx.moveTo(30, 0);
        ctx.lineTo(-20, -15);
        ctx.lineTo(-10, 0);
        ctx.lineTo(-20, 15);
        ctx.closePath();
        ctx.fill();

        // 날개 디테일
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.restore();
    }
}

/**
 * UI 관리 객체
 */
const ui = {
    isMenuOpen: false,

    toggleMenu() {
        this.isMenuOpen = !this.isMenuOpen;
        document.getElementById('upgrade-menu').style.display = this.isMenuOpen ? 'block' : 'none';
        document.getElementById('toggle-menu-btn').innerHTML = this.isMenuOpen ? '메뉴 닫기 (TAB)' : '업그레이드 (TAB)';
    },

    updateHUD() {
        const myData = game.state.players[game.myId];
        if (!myData) return;

        // 포인트 및 핵미사일 UI
        document.getElementById('hud-points').innerText = Math.floor(myData.points);
        document.getElementById('nuke-count').innerText = `보유 핵미사일: ${myData.nukes} (Q키)`;

        // 버튼 활성화 상태
        document.getElementById('btn-up-fire').disabled = myData.points < CONFIG.COSTS.fireRate;
        document.getElementById('btn-up-hp').disabled = myData.points < CONFIG.COSTS.maxHp;
        document.getElementById('btn-up-nuke').disabled = myData.points < CONFIG.COSTS.nuke;

        // 팀 체력바 업데이트
        let html = '';
        for (let id in game.state.players) {
            const p = game.state.players[id];
            const hpPct = Math.max(0, (p.hp / p.maxHp) * 100);
            html += `
                <div class="player-stat-row">
                    <div style="display:flex; justify-content:space-between; font-size:0.8em;">
                        <span>${id === game.myId ? "본인 기체" : "아군 기체"}</span>
                        <span>Score: ${p.score}</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill" style="width:${hpPct}%; background:${p.color}; box-shadow: 0 0 10px ${p.color};"></div>
                    </div>
                </div>
            `;
        }
        document.getElementById('team-status').innerHTML = html;
    },

    showGameOver() {
        document.getElementById('game-over').style.display = 'flex';
    },

    addChat(sender, msg, isSys = false) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = isSys ? 'chat-line chat-sys' : 'chat-line';
        if (!isSys) {
            div.innerHTML = `<span class="chat-name">${sender}:</span> <span>${msg}</span>`;
        } else {
            div.innerText = msg;
        }
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
};

/**
 * 네트워크 관리 객체 (PeerJS)
 */
const net = {
    peer: null,
    conn: null,

    init() {
        // 4자리 숫자로 이루어진 ID 생성
        const myShortId = Math.floor(1000 + Math.random() * 9000).toString();
        this.peer = new Peer(myShortId);

        this.peer.on('open', id => {
            game.myId = id;
            document.getElementById('my-id-text').innerText = id;
            ui.addChat("시스템", `서버 연결 성공! ID: ${id}`, true);
            game.spawnPlayer(id, true);
        });

        this.peer.on('connection', c => {
            this.conn = c;
            game.isHost = true;
            this.setupDataHandler();
            ui.addChat("시스템", "새로운 편대원이 합류했습니다.", true);
            this.startSession();
        });

        this.peer.on('error', err => {
            console.error("Peer Error:", err);
            if(err.type === 'unavailable-id') location.reload();
        });
    },

    join(targetId) {
        this.conn = this.peer.connect(targetId);
        game.isHost = false;
        this.setupDataHandler();
    },

    setupDataHandler() {
        this.conn.on('open', () => {
            this.startSession();
            if(!game.isHost) {
                this.conn.send({ type: 'JOIN_REQ', id: game.myId });
            }
        });

        this.conn.on('data', data => {
            if (data.type === 'CHAT') {
                ui.addChat(data.sender, data.msg);
                return;
            }

            if (game.isHost) {
                // 호스트가 받는 데이터
                if (data.type === 'JOIN_REQ') {
                    game.spawnPlayer(data.id, false);
                } else if (data.type === 'INPUT_SYNC') {
                    if (game.state.players[data.id]) {
                        game.state.players[data.id].inputs = data.keys;
                    }
                } else if (data.type === 'UPGRADE_REQ') {
                    game.applyUpgrade(data.from, data.stat);
                }
            } else {
                // 클라이언트가 받는 데이터
                if (data.type === 'STATE_UPDATE') {
                    game.state = data.state;
                    if(game.state.isGameOver) ui.showGameOver();
                } else if (data.type === 'NUKE_FX') {
                    game.triggerNuke();
                }
            }
        });
    },

    startSession() {
        game.isRunning = true;
        document.getElementById('lobby-view').style.display = 'none';
        document.getElementById('game-hud').style.display = 'block';
    },

    broadcastState() {
        if (this.conn && this.conn.open) {
            this.conn.send({ type: 'STATE_UPDATE', state: game.state });
        }
    },

    sendInput() {
        if (this.conn && this.conn.open) {
            this.conn.send({ type: 'INPUT_SYNC', id: game.myId, keys: game.keys });
        }
    },

    broadcastNuke() {
        if (this.conn && this.conn.open) {
            this.conn.send({ type: 'NUKE_FX' });
        }
    },

    sendChat(msg) {
        if (this.conn && this.conn.open) {
            this.conn.send({ type: 'CHAT', sender: game.myId, msg: msg });
        }
    }
};

/**
 * 전역 핸들러
 */
function joinGame() {
    const id = document.getElementById('join-id-input').value;
    if (id.length === 4) net.join(id);
}

function handleChatSend() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;

    ui.addChat("나", msg);
    net.sendChat(msg);
    input.value = "";
}

// 엔터키 채팅 지원
document.getElementById('chat-input').addEventListener('keypress', e => {
    if(e.key === 'Enter') handleChatSend();
});

// 메인 루프
const game = new GameEngine();
net.init();

function mainLoop() {
    game.update();
    game.render();
    requestAnimationFrame(mainLoop);
}
mainLoop();

</script>
